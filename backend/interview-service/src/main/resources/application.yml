server:
  address: 0.0.0.0
  port: ${PORT:8083}

spring:
  application:
    name: INTERVIEW-SERVICE

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

groq:
  api:
    key: ${GROQ_API_KEY}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}