server:
  port: ${PORT:8082}

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

#eureka:
#  instance:
#    hostname: auth-service-wgml.onrender.com
#    prefer-ip-address: true

  eureka:
    client:
      service-url:
        defaultZone: ${EUREKA_SERVER_URL}

      register-with-eureka: true
      fetch-registry: true

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO

